name: Build and push tor

on:
  push:
    paths:
      - Dockerfile.tor
      - base/kustomization.yaml
      - base/deployment-tor.yaml
  schedule:
    # Rebuild weekly to pick up Tor APT repo updates
    - cron: '0 6 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Docker login
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.tor
          push: true
          tags: |
            ghcr.io/2143-labs/tor:${{ github.run_number }}
            ghcr.io/2143-labs/tor:latest

      - name: Install kustomize
        run: |
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.6.0/kustomize_v5.6.0_linux_amd64.tar.gz" | sudo tar xz -C /usr/local/bin

      - name: Update base image tag
        working-directory: base
        run: |
          kustomize edit set image tor:latest=ghcr.io/2143-labs/tor:${{ github.run_number }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes" || (git commit -am "chore: bump tor image to ${{ github.run_number }}" && git push)
