name: Build and push tor

on:
  push:
    paths:
      - Dockerfile.tor
  schedule:
    # Rebuild weekly to pick up Tor APT repo updates
    - cron: '0 6 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.tor
          push: true
          tags: ghcr.io/2143-labs/tor:latest
