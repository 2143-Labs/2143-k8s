apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: letsencrypt-staging
  namespace: default
spec:
  acme:
    # You must replace this email address with your own.
    # Let's Encrypt will use this to contact you about expiring
    # certificates, and issues related to your account.
    email: john@john2143.com
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      # Secret resource that will be used to store the account's private key.
      name: apps-gateway-tls-private-key-staging

    solvers:
    - dns01:
        digitalocean:
          tokenSecretRef:
            name: digitalocean-dns
            key: access-token
    #- http01:
        #gatewayHTTPRoute:
          #parentRefs:
            #- name: cafe
              #namespace: default
              #kind: Gateway
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: letsencrypt-prod
  namespace: default
spec:
  acme:
    # You must replace this email address with your own.
    # Let's Encrypt will use this to contact you about expiring
    # certificates, and issues related to your account.
    email: john@john2143.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      # Secret resource that will be used to store the account's private key.
      name: apps-gateway-tls-private-key-prod

    solvers:
    - dns01:
        webhook:
          groupName: desec.io
          solverName: desec-http
          config:
            apiUrl: https://desec.io/api/v1
            domainName: brick.gay
            secretName: desec-dns
            secretKeyName: token
      selector:
        dnsZones:
        - brick.gay
    - dns01:
        webhook:
          groupName: desec.io
          solverName: desec-http
          config:
            apiUrl: https://desec.io/api/v1
            domainName: poe.sale
            secretName: desec-dns-john
            secretKeyName: token
      selector:
        dnsZones:
        - poe.sale
    - dns01:
        webhook:
          groupName: desec.io
          solverName: desec-http
          config:
            apiUrl: https://desec.io/api/v1
            domainName: 2143.me
            secretName: desec-dns-john
            secretKeyName: token
        cnameStrategy: Follow
      selector:
        dnsZones:
        - john2143.com
    - dns01:
        webhook:
          groupName: desec.io
          solverName: desec-http
          config:
            apiUrl: https://desec.io/api/v1
            domainName: 2143.me
            secretName: desec-dns-john
            secretKeyName: token
      selector:
        dnsZones:
        - 2143.me
    - dns01:
        digitalocean:
          tokenSecretRef:
            name: digitalocean-dns
            key: access-token
    #- http01:
        #gatewayHTTPRoute:
          #parentRefs:
            #- name: cafe
              #namespace: default
              #kind: Gateway
