apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- https://github.com/kubernetes/kube-state-metrics/examples/standard
- cluster-issuer.yaml
- certs.yaml
- pvc.yaml
- https-redirect.yaml
- deployment-redirector.yaml
- grafana-routes.yaml
- horizontalpodautoscaler.yaml
#- misskey.yaml
#- path: loadbalancer.yaml
patches:
- path: gateway.yaml
- path: deployment.yaml
- path: httproute.yaml
#- path: httproute.yaml
# Remove PocketID Temporal env vars (now mTLS-only, highest index first)
- target:
    kind: Deployment
    name: john2143-com
  patch: |
    - op: remove
      path: /spec/template/spec/containers/0/env/14
    - op: remove
      path: /spec/template/spec/containers/0/env/13
    - op: remove
      path: /spec/template/spec/containers/0/env/12
    - op: remove
      path: /spec/template/spec/containers/0/env/11


images:
- name: bot:latest
  newName: ghcr.io/2143-labs/openfront-api-discordbot
  newTag: openfront-api-discordbot-latest
- name: imagehost:latest
  newName: ghcr.io/john2143/john2143.com
  newTag: "193"
- name: openfrontpro-sim:latest
  newName: ghcr.io/2143-labs/openfrontpro-sim
  newTag: openfrontpro-latest
- name: openfrontpro:latest
  newName: ghcr.io/2143-labs/openfrontpro-rs
  newTag: openfrontpro-latest
