        - |
          curl -f -s 'https://spire-server:443'
          NOCA=$?
          curl -k -f -s 'https://spire-server:443'
          IGNORECA=$?
          echo $NOCA $IGNORECA
          if [ $NOCA -eq 60 ]; then
            if [ $IGNORECA -eq 22 -o $IGNORECA -eq 55 -o $IGNORECA -eq 56 ]; then
              # We were able to connect to the server but didn't recognize the ca (60) and the page not found (22) because we're not using grpc
              exit 0
            fi
          fi
          exit 1
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
          - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
  restartPolicy: Never

