apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tor-data
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tor-middle
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: tor-middle
  template:
    metadata:
      labels:
        app: tor-middle
        servicegroup: "infrastructure"
    spec:
      hostNetwork: true
      nodeSelector:
        doks.digitalocean.com/node-pool: pool-medium
      terminationGracePeriodSeconds: 120
      initContainers:
      - name: volume-permissions
        image: ghcr.io/2143-labs/tor:latest
        command: ["chown", "-R", "101:101", "/var/lib/tor"]
        volumeMounts:
        - name: data
          mountPath: /var/lib/tor
        securityContext:
          runAsUser: 0
      containers:
      - name: tor
        image: ghcr.io/2143-labs/tor:latest
        command: ["tor"]
        args: ["-f", "/etc/tor/torrc"]
        volumeMounts:
        - name: config
          mountPath: /etc/tor
        - name: data
          mountPath: /var/lib/tor
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1500m"
      volumes:
      - name: config
        configMap:
          name: tor-config
      - name: data
        persistentVolumeClaim:
          claimName: tor-data
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tor-config
data:
  torrc: |
    Nickname 2143Me
    ContactInfo tor@2143.me
    ORPort 30901 IPv4Only
    ExitRelay 0
    SocksPort 0
    ControlPort 0
    Log notice stdout
    DataDirectory /var/lib/tor
    RelayBandwidthRate 60 MBits
    RelayBandwidthBurst 120 MBits
    MaxMemInQueues 512 MB
    NumCPUs 2
---
apiVersion: v1
kind: Service
metadata:
  name: tor-middle
spec:
  type: NodePort
  ports:
  - port: 30901
    targetPort: 30901
    nodePort: 30901
    protocol: TCP
    name: tor
  selector:
    app: tor-middle

