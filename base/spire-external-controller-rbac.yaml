apiVersion: v1
kind: ServiceAccount
metadata:
  name: spire-external-controller
  namespace: spire-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spire-external-controller
rules:
# k8s_psat node attestor: get specific node, get specific pod
- apiGroups: [""]
  resources: ["nodes", "pods"]
  verbs: ["get", "list", "watch"]
# bundle publisher: publish spire-bundle-upstream ConfigMap
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
# controller-runtime cache: watch Endpoints, Namespaces
- apiGroups: [""]
  resources: ["endpoints", "namespaces"]
  verbs: ["get", "list", "watch"]
# daemonset patching (agent registration)
- apiGroups: ["apps"]
  resources: ["daemonsets"]
  verbs: ["get", "list", "watch", "patch"]
# leader election lease in spire-server namespace
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "create", "update", "patch"]
# node attestation: validate service account tokens
- apiGroups: ["authentication.k8s.io"]
  resources: ["tokenreviews"]
  verbs: ["create"]
# controller events (non-blocking but avoids log spam)
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
# SPIFFE CRD reconciliation: watch and update status on ClusterSPIFFEID, etc.
- apiGroups: ["spire.spiffe.io"]
  resources: ["*"]
  verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spire-external-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: spire-external-controller
subjects:
- kind: ServiceAccount
  name: spire-external-controller
  namespace: spire-system
