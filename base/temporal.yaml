---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-temporal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-temporal
  template:
    metadata:
      labels:
        app: postgres-temporal
    spec:
      volumes:
      - name: pgdata
        persistentVolumeClaim:
          claimName: temporal-pg-pvc
      containers:
      - name: postgres
        image: postgres:16
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: temporal
        - name: POSTGRES_PASSWORD
          value: temporal
        - name: POSTGRES_DB
          value: temporal
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: pgdata
        resources:
          requests:
            memory: "256Mi"
            cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-temporal
spec:
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  selector:
    app: postgres-temporal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal
  template:
    metadata:
      labels:
        app: temporal
        servicegroup: "mine"
    spec:
      containers:
      - name: temporal
        image: temporalio/auto-setup:1.25.2
        ports:
        - containerPort: 7233
          name: grpc
        - containerPort: 8233
          name: http
        env:
        - name: DB
          value: postgres12
        - name: DB_PORT
          value: "5432"
        - name: POSTGRES_SEEDS
          value: postgres-temporal
        - name: POSTGRES_USER
          value: temporal
        - name: POSTGRES_PWD
          value: temporal
        - name: SKIP_DB_CREATION
          value: "false"
        - name: DYNAMIC_CONFIG_FILE_PATH
          value: config/dynamicconfig/development.yaml
        resources:
          requests:
            memory: "512Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: temporal
spec:
  ports:
  - port: 7233
    targetPort: 7233
    protocol: TCP
    name: grpc
  - port: 8233
    targetPort: 8233
    protocol: TCP
    name: http
  selector:
    app: temporal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-ui
  template:
    metadata:
      labels:
        app: temporal-ui
        servicegroup: "mine"
    spec:
      containers:
      - name: temporal-ui
        image: temporalio/ui:2.34.1
        ports:
        - containerPort: 8080
        env:
        - name: TEMPORAL_ADDRESS
          value: temporal:7233
        - name: TEMPORAL_CORS_ORIGINS
          value: http://localhost:3000
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-ui
spec:
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: temporal-ui
