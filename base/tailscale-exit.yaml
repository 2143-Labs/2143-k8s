---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tailscale-exit
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tailscale-exit
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["tailscale-exit-state"]
  verbs: ["get", "update", "patch"]
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["tailscale-exit-auth"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tailscale-exit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tailscale-exit
subjects:
- kind: ServiceAccount
  name: tailscale-exit
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tailscale-exit
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tailscale-exit
  template:
    metadata:
      labels:
        app: tailscale-exit
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: tailscale-exit
      initContainers:
      - name: sysctl
        image: busybox:latest
        command:
        - sh
        - -c
        - sysctl -w net.ipv4.ip_forward=1 && sysctl -w net.ipv6.conf.all.forwarding=1
        securityContext:
          privileged: true
      containers:
      - name: tailscale
        image: tailscale/tailscale:latest
        env:
        - name: TS_AUTHKEY
          valueFrom:
            secretKeyRef:
              name: tailscale-exit-auth
              key: key
        - name: TS_HOSTNAME
          value: "do-exit-node"
        - name: TS_EXTRA_ARGS
          value: "--login-server=https://net.john2143.com --advertise-exit-node --accept-routes"
        - name: TS_USERSPACE
          value: "false"
        - name: TS_KUBE_SECRET
          value: "tailscale-exit-state"
        - name: TS_AUTH_ONCE
          value: "true"
        - name: TS_ACCEPT_DNS
          value: "false"
        securityContext:
          privileged: true
          capabilities:
            add: ["NET_ADMIN"]
      - name: alloy
        image: grafana/alloy:latest
        args: ["run", "/etc/alloy/config.alloy"]
        volumeMounts:
          - name: varlog
            mountPath: /var/log
            readOnly: true
          - name: alloy-config
            mountPath: /etc/alloy
      volumes:
      - name: varlog
        hostPath:
          path: /var/log
      - name: alloy-config
        configMap:
          name: alloy-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
data:
  config.alloy: |
    // Collect webserver access logs and ship to Loki via Headscale #2.
    // DO NYC exit node has TS_ACCEPT_DNS=false, so Loki endpoint MUST be
    // an IP address — either the kube-vip LB (192.168.5.12, preferred,
    // requires Headscale #2 subnet route) or a home node tailnet IP
    // (100.64.0.x) with a Loki gateway NodePort.
    local.file_match "webserver_logs" {
      path_targets = [
        {"__path__": "/var/log/nginx/access.log"},
        {"__path__": "/var/log/apache2/access.log"},
      ]
    }
    loki.source.file "webserver" {
      targets    = local.file_match.webserver_logs.targets
      forward_to = [loki.write.default.receiver]
    }
    loki.write "default" {
      endpoint {
        // Option 1 (preferred): Loki push LB via Headscale #2 subnet route
        url = "http://192.168.5.12:3100/loki/api/v1/push"
        // Option 2: home node tailnet IP + NodePort
        // url = "http://100.64.0.X:3100/loki/api/v1/push"
      }
    }
