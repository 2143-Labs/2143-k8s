apiVersion: apps/v1
kind: Deployment
metadata:
  name: john2143-com
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: john2143-com
  template:
    metadata:
      labels:
        app: john2143-com
        servicegroup: "mine"
    spec:
      serviceAccountName: john2143-com
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: files-pvc
      - name: temporal-certs
        secret:
          secretName: temporal-mtls-client
      - name: spiffe-workload-api
        csi:
          driver: csi.spiffe.io
          readOnly: true

      #securityContext:
        #runAsUser: 1000
        #runAsGroup: 1000
        #fsGroup: 1000

      containers:
      - name: john2143-com
        image: imagehost:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: &port 3000
        volumeMounts:
        - mountPath: /app/juushFiles
          name: data-volume
        - mountPath: /spiffe-workload-api
          name: spiffe-workload-api
          readOnly: true
        - mountPath: /etc/temporal-certs
          name: temporal-certs
          readOnly: true
        env:
        - name: RUN_MODE
          value: "server"

        - name: S3_ENDPOINT_URL
          value: "https://imagehost-files.nyc3.digitaloceanspaces.com"
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: S3_ACCESS_KEY
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: S3_SECRET_KEY
        - name: MINIO_ENDPOINT_URL
          value: "https://files.john2143.com"
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: MINIO_ACCESS_KEY
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: minio-credentials
              key: MINIO_SECRET_KEY
        - name: SPIFFE_ENDPOINT_SOCKET
          value: "unix:///spiffe-workload-api/spire-agent.sock"

        - name: BUCKET
          value: imagehost-files
        - name: FOLDER
          value: public-prod
        - name: DB
          valueFrom:
            secretKeyRef:
              name: mongo-creds
              key: server-uri
        - name: PORT
          value: "3000"
        - name: IP
          value: "0.0.0.0"
        - name: NODE_ENV
          value: production
        - name: AUTH_CALLBACK_BASE
          value: "https://2143.me"
        - name: POCKETID_ISSUER
          value: "https://au.2143.me"
        - name: POCKETID_ADMIN_GROUP
          value: "admin"
        - name: POCKETID_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: oauth-creds
              key: POCKETID_CLIENT_ID
        - name: POCKETID_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: oauth-creds
              key: POCKETID_CLIENT_SECRET
        - name: DISCORD_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: oauth-creds
              key: DISCORD_CLIENT_ID
        - name: DISCORD_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: oauth-creds
              key: DISCORD_CLIENT_SECRET
        - name: DISCORD_ADMIN_IDS
          value: ""
        - name: TEMPORAL_ADDRESS
          value: "temporal-grpc.john2143.com:7233"
        - name: TEMPORAL_TLS
          value: "true"
        - name: TEMPORAL_TLS_CA_PATH
          value: "/etc/temporal-certs/ca.crt"
        - name: TEMPORAL_TLS_SERVER_NAME
          value: "temporal-grpc.john2143.com"

        resources:
          requests:
            memory: "128Mi"
            cpu: "10m"
          limits:
            memory: "384Mi"
            cpu: "1000m"

        livenessProbe:
          httpGet:
            path: /health
            port: *port
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 5

        readinessProbe:
          httpGet:
            path: /health
            port: *port
          initialDelaySeconds: 1
          periodSeconds: 5
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: john2143-com
spec:
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: john2143-com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
        servicegroup: "mine"
    spec:
      volumes:
      - name: mongodata
        #emptyDir:
          #sizeLimit: 50Mi
        persistentVolumeClaim:
          claimName: mongo-pvc

      containers:
      - name: mongo
        image: mongo
        ports:
        - containerPort: 27017

        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: admin
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongo-creds
              key: password

        volumeMounts:
          - mountPath: /data/db
            name: mongodata

        resources:
          requests:
            memory: "330Mi"
            cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
spec:
  ports:
  - port: 27017
    targetPort: 27017
    protocol: TCP
    name: http
  selector:
    app: mongo

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: john2143-com
  namespace: default
